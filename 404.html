<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Carers Community Circle</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="icon" type="image/png" href="assets/logotra.png">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(150deg, #FAF8F6 0%, #f0e6f0 40%, #f9e8f0 100%);
      text-align: center;
      padding: 2rem;
    }
    .error-inner {
      max-width: 560px;
    }
    .error-code {
      font-size: 7rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 1rem;
      opacity: 0.15;
      letter-spacing: -0.05em;
    }
    .error-icon {
      font-size: 3.5rem;
      color: var(--primary);
      margin-bottom: 1.5rem;
    }
    .error-inner h1 {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 1rem;
    }
    .error-inner p {
      color: var(--text-mid);
      font-size: 1.0625rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-inner">
      <div class="error-code">404</div>
      <div class="error-icon"><i class="fas fa-heart-broken" aria-hidden="true"></i></div>
      <h1>Page not found</h1>
      <p>Sorry — we couldn't find the page you were looking for. It may have been moved or no longer exists. Let's get you back to a familiar place.</p>
      <div class="error-actions">
        <a href="/" class="btn btn-primary"><i class="fas fa-home" aria-hidden="true"></i> Back to Home</a>
        <a href="/#contact" class="btn btn-secondary">Contact Us</a>
      </div>
    </div>
  </div>
</body>
</html>
